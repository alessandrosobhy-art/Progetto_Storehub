name: Deploy StoreHub to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  AZURE_WEBAPP_NAME: "progetto-storehub"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python sources
        run: |
          python -m py_compile app.py wsgi.py run_waitress.py controller_monitoring.py

      - name: Ensure startup script is executable
        run: chmod +x startup.sh

  deploy-production:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event.inputs.target == 'production'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Azure Web App production
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISH_PROFILE_PRODUCTION }}
          package: .

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'staging'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Azure Web App staging slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: staging
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISH_PROFILE_STAGING }}
          package: .
