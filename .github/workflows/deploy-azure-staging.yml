name: Deploy FP to Azure staging

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  AZURE_WEBAPP_NAME: "progetto-storehub"
  AZURE_WEBAPP_SLOT: "staging"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python sources
        run: |
          python -m py_compile app.py wsgi.py run_waitress.py controller_monitoring.py

      - name: Ensure startup script is executable
        run: chmod +x startup.sh

      - name: Deploy to Azure Web App staging slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: ${{ env.AZURE_WEBAPP_SLOT }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISH_PROFILE_STAGING }}
          package: .
