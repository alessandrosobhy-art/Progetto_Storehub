<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}StoreHub{% endblock %}</title>
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/app-icons/favicon-20260429userlogos1.ico') }}?v={{ app_build_version }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}?v={{ app_build_version }}">
  <style>
    body.public-shell{
      background: var(--app-bg, #eef5fb);
      color: var(--app-text, #223041);
      font-family: "Segoe UI Variable", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      letter-spacing: .01em;
      min-height: 100vh;
    }
    .public-topbar{
      background: rgba(255,255,255,.94);
      border-bottom: 1px solid var(--app-nav-border, #cddbe8);
    }
    .public-topbar__inner{
      max-width: 960px;
      margin: 0 auto;
      padding: .75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .public-topbar__brand{
      display: flex;
      align-items: center;
      gap: .6rem;
      text-decoration: none;
    }
    .public-topbar__brand img{
      width: 34px;
      height: 34px;
      border-radius: 9px;
    }
    .public-topbar__name{
      font-weight: 700;
      color: var(--app-heading, #162336);
    }
  </style>
</head>
<body class="public-shell">
  <header class="public-topbar">
    <div class="public-topbar__inner">
      <a class="public-topbar__brand" href="{{ url_for('login') }}">
        <img src="{{ url_for('static', filename='img/app-icons/icon-180x180-20260429userlogos1.png') }}?v={{ app_build_version }}" alt="StoreHub">
        <span class="public-topbar__name">StoreHub</span>
      </a>
      <a class="btn btn-primary btn-sm" href="{{ url_for('login') }}">Accedi</a>
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
