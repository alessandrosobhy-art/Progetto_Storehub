{% extends "base.html" %}

{% block title %}Andamento{% endblock %}

{% block head_extra %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/controlli_pnl_v1.css') }}?v=1.1.6">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/controlli_andamento_v1.css') }}?v=1.0.3">
{% endblock %}

{% block content %}
{% include "_controlli_toolbar.html" %}

<div class="container-fluid py-3">
  <div class="d-flex align-items-center justify-content-end flex-wrap gap-2 mb-3">
    <div class="text-muted small">Periodo: <span id="trendPeriodLabel">—</span></div>
  </div>

  <div class="card shadow-sm mb-3">
    <div class="card-body">
      <div class="row g-2 align-items-end">
        <div class="col-12 col-md-4">
          <label class="form-label">Store</label>
          <div class="input-group">
            <input class="form-control" id="trendStoresLabel"
                   value="{% if store_code %}{{ store_code }}{% else %}Nessuno store selezionato{% endif %}"
                   readonly>
            <button class="btn btn-outline-secondary" type="button"
                    data-bs-toggle="modal" data-bs-target="#trendStoresModal">Seleziona</button>
          </div>
        </div>

        <div class="col-6 col-md-2">
          <label class="form-label">Anno</label>
          <select class="form-select" id="trendYear"></select>
        </div>

        <div class="col-6 col-md-2">
          <label class="form-label">Dal mese</label>
          <select class="form-select" id="trendMonthFrom"></select>
        </div>

        <div class="col-6 col-md-2">
          <label class="form-label">Al mese</label>
          <select class="form-select" id="trendMonthTo"></select>
        </div>

        <div class="col-12 col-md-2">
          <button class="btn btn-primary w-100" id="trendApply">Applica</button>
        </div>
      </div>
    </div>
  </div>

  <div id="trendLegendBar" class="trend-legend-bar mb-2">
    <span class="badge text-bg-secondary">Budget</span>
    <span class="badge text-bg-primary">Actual</span>
    <span class="badge text-bg-success">Anno precedente</span>
  </div>

  <div id="trendLoading" class="text-muted small d-none mb-2">
    <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
    Caricamento...
  </div>

  <div class="alert alert-danger d-none" id="trendError"></div>

  <div id="trendChartsWrap" class="trend-grid"></div>
</div>

<!-- Modal: selezione store -->
<div class="modal fade" id="trendStoresModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Seleziona store</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Chiudi"></button>
      </div>
      <div class="modal-body">
        <div class="d-flex gap-2 mb-2">
          <input type="text" class="form-control" id="trendStoresSearch" placeholder="Cerca...">
          <button class="btn btn-outline-secondary" id="trendStoresAll" type="button">Tutti</button>
          <button class="btn btn-outline-secondary" id="trendStoresNone" type="button">Nessuno</button>
        </div>
        <div class="list-group" id="trendStoresList"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Chiudi</button>
        <button type="button" class="btn btn-primary" id="trendStoresApply" data-bs-dismiss="modal">Applica</button>
      </div>
    </div>
  </div>
</div>

<script>
window.__TrendCfg = {
  apiUrl: "{{ url_for('controlli.api_andamento') }}",
  defaultYear: {{ default_year|int }},
  defaultMonth: {{ default_month|int }},
  storeCode: "{{ store_code or '' }}",
  storesJsonUrl: "{{ url_for('warehouse.stores_json') }}"
};
</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="{{ url_for('static', filename='js/controlli_andamento_v1.js') }}?v=1.0.5"></script>
{% endblock %}
