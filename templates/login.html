<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Accedi · StoreHub</title>
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/app-icons/favicon-20260429userlogos1.ico') }}?v={{ app_build_version }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}?v={{ app_build_version }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth_v1.css') }}?v={{ app_build_version }}">
</head>
<body class="auth-shell">
  <div class="auth-card">
    <div class="auth-card__body">
      <div class="auth-brand">
        <img src="{{ url_for('static', filename='img/app-icons/icon-180x180-20260429userlogos1.png') }}?v={{ app_build_version }}" alt="StoreHub">
        <div>
          <div class="auth-brand__name">StoreHub</div>
          <div class="auth-brand__tag">Gestione punti vendita</div>
        </div>
      </div>
      <div class="auth-title">Accedi</div>
      <div class="auth-subtitle">Entra con le credenziali del tuo account.</div>
      {% with msgs = get_flashed_messages(with_categories=true) %}
        {% if msgs %}{% for c,m in msgs %}<div class="alert alert-{{ c }}">{{ m|safe }}</div>{% endfor %}{% endif %}
      {% endwith %}
      <form method="post" action="{{ url_for('login_post', next=request.args.get('next')) }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" name="email" autocomplete="username" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" name="password" autocomplete="current-password" required>
        </div>
        <button class="btn btn-primary w-100">Accedi</button>
      </form>
      <div class="auth-links">
        <a href="{{ url_for('forgot_password') }}">Password dimenticata?</a>
      </div>
      <div class="auth-footnote">
        <a href="{{ url_for('cookie_policy') }}">Cookie Policy</a>
      </div>
    </div>
  </div>

  <!-- Gestione automatica dei link Supabase nell'hash -->
  <script>
  (function(){
    var h = window.location.hash || "";
    if (!h) return;
    var params = new URLSearchParams(h.charAt(0)==='#' ? h.substring(1) : h);
    var hasAccess = !!params.get('access_token');
    var hasError  = !!(params.get('error') || params.get('error_code'));
    if (hasAccess || hasError) {
      // Centralizziamo tutto su /auth/reset: lì gestiamo sia reset che link scaduto
      window.location.replace('/auth/reset' + h);
    }
  })();
  </script>
</body>
</html>
